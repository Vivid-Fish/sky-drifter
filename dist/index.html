<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Sky Drifter</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1}

/* Splash */
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(170deg,#0a0f1e,#141e30 50%,#0d1520);z-index:100;transition:opacity .9s ease}
#splash.out{opacity:0;pointer-events:none}
#splash h1{font-size:clamp(2rem,8vw,4rem);font-weight:100;letter-spacing:.35em;color:#c8daf0;margin-bottom:.3rem}
#splash p{color:#5a7090;font-size:clamp(.85rem,2.5vw,1rem);margin-bottom:2rem}
.splash-keys{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem;max-width:340px}
.splash-keys div{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.45rem .75rem;color:#8aa0b8;font-size:clamp(.7rem,2vw,.82rem)}
.splash-keys div b{color:#c0d4ee}
#go-btn{background:linear-gradient(135deg,#4a6fa5,#6b8fc7);border:none;color:#fff;padding:.85rem 2.8rem;border-radius:50px;font-size:clamp(.95rem,3vw,1.1rem);letter-spacing:.12em;cursor:pointer;-webkit-appearance:none}
#go-btn:active{transform:scale(.96)}

/* HUD */
#hud{position:fixed;top:env(safe-area-inset-top,12px);left:12px;z-index:10;color:rgba(200,220,240,.65);font-size:clamp(.68rem,2vw,.78rem);pointer-events:none;line-height:1.6}
#compass{position:fixed;bottom:max(12px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:10;color:rgba(200,220,240,.45);font-size:clamp(.7rem,2.2vw,.82rem);pointer-events:none;letter-spacing:.12em}

/* Touch controls - positioned for thumbs */
.joystick-zone{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));z-index:20;width:140px;height:140px;pointer-events:auto}
#stick-left{left:20px}
#stick-right{right:20px}
.joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1)}
.joystick-thumb{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(200,220,240,.18);border:1.5px solid rgba(200,220,240,.25);left:50%;top:50%;transform:translate(-50%,-50%)}
.joystick-thumb.active{background:rgba(200,220,240,.32)}
.joystick-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);color:rgba(200,220,240,.3);font-size:.6rem;letter-spacing:.1em;white-space:nowrap}

/* Throttle bar */
#throttle-bar{position:fixed;right:max(12px,env(safe-area-inset-right));top:50%;transform:translateY(-50%);z-index:20;width:28px;height:min(40vh,200px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;pointer-events:auto}
#throttle-fill{position:absolute;bottom:0;left:0;right:0;border-radius:14px;background:linear-gradient(to top,#4a6fa5,#6b8fc7);transition:height .1s}
#throttle-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);color:rgba(200,220,240,.25);font-size:.55rem;letter-spacing:.08em}

/* Gyro button */
#gyro-btn{position:fixed;top:env(safe-area-inset-top,12px);right:12px;z-index:30;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.35rem .7rem;color:rgba(200,220,240,.5);font-size:.65rem;letter-spacing:.08em;cursor:pointer;pointer-events:auto;-webkit-appearance:none}
#gyro-btn.on{background:rgba(100,140,200,.2);border-color:rgba(100,140,200,.3);color:rgba(200,220,240,.8)}

@media(min-width:768px){.joystick-zone{display:none}#throttle-bar{display:none}#gyro-btn{display:none}}</style>

<h1>SKY DRIFTER</h1>
<p>A relaxing flight experience</p>
<div class="splash-keys">
<div><b>W/S</b> Pitch</div>
<div><b>A/D</b> Roll</div>
<div><b>Q/E</b> Yaw</div>
<div><b>&uarr;</b> Throttle &uarr;</div>
<div><b>Space</b> Throttle &darr;</div>
</div>
<button id="go-btn">Take Flight</button>
</div>

<div id="compass">N 0&deg;</div>
<div class="joystick-zone" id="stick-left"><div class="joystick-base"></div><div class="joystick-thumb" id="thumb-l"></div><div class="joystick-label">PITCH / ROLL</div></div>
<div class="joystick-zone" id="stick-right"><div class="joystick-base"></div><div class="joystick-thumb" id="thumb-r"></div><div class="joystick-label">YAW / PITCH</div></div>
<div id="throttle-bar"><div id="throttle-fill" style="height:50%"></div><div id="throttle-label">THR</div></div>
<button id="gyro-btn">GYRO</button>

  plane.speed += (targetSpeed - plane.speed) * dt * 0.5;
  const euler = new THREE2.Euler(plane.pitch, plane.yaw, plane.roll, "YXZ");
  const targetQuat = new THREE2.Quaternion().setFromEuler(euler);
  plane.quaternion.slerp(targetQuat, dt * 3);
  const forward = new THREE2.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
  plane.velocity.copy(forward.multiplyScalar(plane.speed));
  plane.velocity.y += Math.max(0, -plane.pitch * plane.speed * 0.5) * dt - 0.3 * dt;
  plane.position.add(plane.velocity.clone().multiplyScalar(dt));
  const terrainHeight = height(plane.position.x, plane.position.z);
  const minAlt = Math.max(terrainHeight + 10, -5 + 5);
  if (plane.position.y < minAlt) {
    plane.position.y = minAlt;
    plane.pitch = Math.max(0, plane.pitch * 0.5 - 0.1);
  }
  aircraft.position.copy(plane.position);
  aircraft.quaternion.copy(plane.quaternion);
  prop.rotation.z += plane.throttle * 30 * dt;
  const camOffset = new THREE2.Vector3(0, 3, 12).applyQuaternion(plane.quaternion);
  camera.position.lerp(plane.position.clone().add(camOffset), dt * 4);
  camera.lookAt(plane.position.clone().add(new THREE2.Vector3(0, 0, -30).applyQuaternion(plane.quaternion)));
  chunkTimer += dt;
  if (chunkTimer > 0.2) {
    updateChunks(scene, chunks, plane.position);
    chunkTimer = 0;
  }
  for (const cloud of clouds) {
    cloud.position.x += cloud.userData.sp * dt;
    cloud.position.z += cloud.userData.dr * dt;
    const dx = cloud.position.x - plane.position.x, dz = cloud.position.z - plane.position.z;
    const wrap = 1e3;
    if (dx > wrap) cloud.position.x -= wrap * 2;
    if (dx < -wrap) cloud.position.x += wrap * 2;
    if (dz > wrap) cloud.position.z -= wrap * 2;
    if (dz < -wrap) cloud.position.z += wrap * 2;
  }
  sky.position.set(plane.position.x, 0, plane.position.z);
  water.position.x = plane.position.x;
  water.position.z = plane.position.z;
  waterMat.opacity = 0.65 + Math.sin(now * 1e-3) * 0.05;
  updateHUD();
  renderer.render(scene, camera);
}
document.getElementById("go-btn").addEventListener("click", () => {
  document.getElementById("splash").classList.add("out");
  go = true;
});
loop();
</script>
